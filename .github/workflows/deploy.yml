name: Deploy harness demo to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/init-project-setup-nJzg8
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install plugin deps
        run: npm ci

      - name: Run elegant harness — todo (crud-list)
        run: npm run demo:todo

      - name: Run elegant harness — weather (fetch-card)
        run: npm run demo:weather

      - name: Install todo app deps
        run: npm install --no-audit --no-fund
        working-directory: demo-output

      - name: Build todo app
        run: npm run build
        working-directory: demo-output

      - name: Install weather app deps
        run: npm install --no-audit --no-fund
        working-directory: weather-output

      - name: Build weather app
        run: npm run build
        working-directory: weather-output

      - name: Assemble Pages site
        run: npm run pages:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
